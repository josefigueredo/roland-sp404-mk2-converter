source_root: "E:\\Music\\FromMars"
target_root: "ROLAND/IMPORT"

# Where to find one-shot samples within each pack (tried in order)
wav_subdir_patterns:
  - "WAV/01. Individual Hits"
  - "WAV/Individual Hits"
  - "WAV/One Shots/Individual Hits"
  - "WAV/Drums/01. Individual Hits"
  - "WAV"

# For synth packs: which notes to pick from multi-sampled patches
synth_representative_notes: ["C2", "C3", "C4"]

# Skip these
skip_extensions: [".asd", ".nki", ".exs", ".dwp", ".als", ".cfg", ".mp4", ".DS_Store"]
skip_dirs: ["__MACOSX", "Ableton Live", "Kontakt", "Logic EXS", "FL Studio", "Reason"]

tiers:
  1:
    - pack: "808 From Mars"
      machine_id: "808"
      type: drum
    - pack: "909 From Mars"
      machine_id: "909"
      type: drum
    - pack: "MPC60 From Mars"
      machine_id: "MPC60"
      type: drum
